# 包管理器提示。占位符会被填充并保持不译：%id% 是 SPDX 标识（以 <code> 显示），
# %languages% 是语言链接，%clauses% 是可选的括号补充内容。此处仅翻译周边正文。
sidebar_pkg_html: |-
  如适用，请将 %id%%clauses% 添加到项目的包描述信息中（例如 %languages%）。这样可确保许可证显示在各包目录中。
sidebar_pkg_only_html: " （或使用 %id% 以禁止未来的版本）"
sidebar_pkg_ofl_html: " （或者，若在版权声明之后指定了保留字体名称，则使用 %id%）"
sidebar_gplcc_html: |-
  如果你希望项目采用 GPL-3.0 的补救条款，请将 <a href="https://gplcc.github.io/gplcc/">GPL Cooperation Commitment</a> 的<a href="https://github.com/gplcc/gplcc/blob/master/Project/COMMITMENT">文本</a>添加到一个名为 <code>COMMITMENT</code> 的文件中，并将其放在与 %id% 许可证文件相同的目录下。

