# --- 首页 --------------------------------------------------------------------
home_intro: |-
  开源许可证保护着贡献者和用户。没有这层保护，企业和资深开发者都不会碰你的项目。
home_situations_question: "以下哪一项最能描述你的情况？"
home_community_title: "我需要在一个社区中工作。"
home_community_content: |-
  使用你所贡献或所依赖的[社区偏好的许可证](community/)，你的项目就能完美融入其中。

  如果你的某个依赖没有许可证，请请求其维护者[添加一个许可证](no-permission/#for-users)。
home_permissive_title: "我想要简单而宽松的许可证。"
home_permissive_content: |-
  [MIT 许可证](licenses/mit/)简短而直接。它允许人们对你的项目做几乎任何想做的事，比如制作并发布闭源版本。
home_copyleft_title: "我在意改进成果能被共享。"
home_copyleft_content: |-
  [GNU GPLv3](licenses/gpl-3.0/) 同样允许人们对你的项目做几乎任何想做的事，*但唯独不能*发布闭源版本。
home_more_question: "如果这些都不适合我怎么办？"
home_nonsoftware_title: "我的项目不是软件。"
home_nonsoftware_content: |-
  [有适用于这种情况的许可证](non-software/)。
home_morechoices_title: "我想要更多选择。"
home_morechoices_content: |-
  [还有更多许可证可供选用](licenses/)。
home_nolicense_title: "我不想选择任何许可证。"
home_nolicense_content: |-
  [看看不选会发生什么](no-permission/)。

# --- 许可证页面（/licenses/）------------------------------------------------
licenses_intro_html: |-
  开源许可证授予任何人以任何目的使用、修改和分享被许可软件的权利，但须遵守一些用以保留软件来源和开放性的条件。以下许可证按条件数量排序，从最多（GNU AGPLv3）到没有任何条件（Unlicense）。请注意，<a href="/">首页</a>上重点推荐的热门许可证（GNU GPLv3 和 MIT）也都落在这一区间之内。
licenses_appendix_note_html: |-
  如果你想要一张涵盖 choosealicense.com 上所有许可证的参考表，请查看<a href="/appendix">附录</a>。
licenses_outro_html: |-
  上述许可证代表了开源许可证的整个区间，从高度保护性到完全无条件。其中之一应当适用于大多数新的开源项目。还存在许多其他开源许可证，包括上述某些许可证的旧版本和相近替代品。如果你想进一步了解，请查阅我们<a href="/about/">关于页面</a>所列出的资源。

  如果你已经心中有数，并且有偏好使用的许可证，那很好！我们无意改变你的想法。但如果你被众多的选择弄得不知所措，也许我们能帮上忙。

# --- 附录（/appendix/）------------------------------------------------------
appendix_intro: |-
  以下是 [choosealicense.com 仓库](https://github.com/github/choosealicense.com)中描述的所有许可证的表格，供参考。

  如果你来这里是为了选择许可证，**[请从首页开始](/)**，了解几个适用于大多数情况的许可证。
appendix_col_license: "许可证"
appendix_legend_heading: "图例"
appendix_legend_permissions_html: |-
  开源许可证向公众授予 <span class="license-permissions"><span class="license-marker">✓</span></span> <b>许可</b>，准许对被许可作品做一些版权或其他「知识产权」法律本可能禁止的事情。
appendix_legend_conditions_html: |-
  大多数开源许可证授予的许可，都以遵守一些 <span class="license-conditions"><span class="license-marker">ⓘ</span></span> <b>条件</b>为前提。
appendix_legend_limitations_html: |-
  大多数开源许可证还设有一些 <span class="license-limitations"><span class="license-marker">✕</span></span> <b>限制</b>，通常用以免除担保和责任，有时还明确将专利或商标排除在许可的授予之外。

