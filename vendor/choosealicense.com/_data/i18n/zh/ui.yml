sidebar_suggest_body_md: |-
  提交一个 pull request，为某个[尚未授权](/no-permission/)的项目推荐此许可证。请保持礼貌：先看看是否已经有人推荐过许可证，尽量推荐适合该项目[社区](/community/)的许可证，并与项目维护者保持友好沟通。
