# Traducción al español de las cadenas de interfaz y la prosa de las páginas.
# Cualquier clave ausente aquí recae automáticamente en el inglés (_data/i18n/en/ui.yml).
# Las claves _html contienen HTML en bruto; los demás valores multilínea son
# Markdown. Los resúmenes de licencias están en licenses.yml y las etiquetas de
# reglas en rules.yml. Los textos legales de las licencias nunca se traducen.

