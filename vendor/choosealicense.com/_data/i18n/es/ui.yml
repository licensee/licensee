# --- Página de inicio --------------------------------------------------------
home_intro: |-
  Una licencia de código abierto protege a quienes contribuyen y a quienes usan el proyecto. Las empresas y las personas desarrolladoras experimentadas no tocarán un proyecto que carezca de esta protección.
home_situations_question: "¿Cuál de las siguientes situaciones describe mejor la tuya?"
home_community_title: "Necesito trabajar dentro de una comunidad."
home_community_content: |-
  Usa la [licencia preferida por la comunidad](community/) a la que contribuyes o de la que dependes. Tu proyecto encajará a la perfección.

  Si tienes una dependencia que no tiene licencia, pide a sus mantenedores que [añadan una licencia](no-permission/#for-users).
home_permissive_title: "La quiero simple y permisiva."
home_permissive_content: |-
  La [licencia MIT](licenses/mit/) es breve y va al grano. Permite que cualquiera haga casi cualquier cosa con tu proyecto, como crear y distribuir versiones de código cerrado.
home_copyleft_title: "Me importa compartir las mejoras."
home_copyleft_content: |-
  La [GNU GPLv3](licenses/gpl-3.0/) también permite que cualquiera haga casi cualquier cosa con tu proyecto, *excepto* distribuir versiones de código cerrado.
home_more_question: "¿Y si ninguna de estas me sirve?"
home_nonsoftware_title: "Mi proyecto no es software."
home_nonsoftware_content: |-
  [Hay licencias para eso](non-software/).
home_morechoices_title: "Quiero más opciones."
home_morechoices_content: |-
  [Hay más licencias disponibles](licenses/).
home_nolicense_title: "No quiero elegir una licencia."
home_nolicense_content: |-
  [Esto es lo que pasa si no lo haces](no-permission/).

# --- Página de licencias (/licenses/) ----------------------------------------
licenses_intro_html: |-
  Las licencias de código abierto conceden permiso a cualquiera para usar, modificar y compartir el software licenciado con cualquier fin, sujeto a condiciones que preservan la procedencia y la apertura del software. Las siguientes licencias se ordenan por número de condiciones, de la que más tiene (GNU AGPLv3) a ninguna (Unlicense). Observa que las licencias populares destacadas en la <a href="/">página de inicio</a> (GNU GPLv3 y MIT) se sitúan dentro de este espectro.
licenses_appendix_note_html: |-
  Si buscas una tabla de referencia con todas las licencias de choosealicense.com, consulta el <a href="/appendix">apéndice</a>.
licenses_outro_html: |-
  Las licencias anteriores representan todo el espectro de las licencias de código abierto, desde las muy protectoras hasta las incondicionales. Alguna de ellas debería servir para la mayoría de los nuevos proyectos de código abierto. Existen muchas otras licencias de código abierto, incluidas versiones anteriores y equivalentes cercanos de algunas de las anteriores. Consulta los recursos enumerados en nuestra <a href="/about/">página «acerca de»</a> si quieres leer más.

  Si ya sabes lo que haces y tienes una licencia que prefieres usar, ¡estupendo! No estamos aquí para hacerte cambiar de idea. Pero si el gran número de opciones te abruma, quizá podamos ayudarte.

# --- Apéndice (/appendix/) ---------------------------------------------------
appendix_intro: |-
  A modo de referencia, aquí tienes una tabla de todas las licencias descritas en el [repositorio de choosealicense.com](https://github.com/github/choosealicense.com).

  Si estás aquí para elegir una licencia, **[empieza por la página de inicio](/)** para ver algunas licencias que servirán en la mayoría de los casos.
appendix_col_license: "Licencia"
appendix_legend_heading: "Leyenda"
appendix_legend_permissions_html: |-
  Las licencias de código abierto conceden al público <span class="license-permissions"><span class="license-marker">✓</span></span> <b>permisos</b> para hacer con las obras licenciadas cosas que el copyright u otras leyes de «propiedad intelectual» podrían, de otro modo, prohibir.
appendix_legend_conditions_html: |-
  En la mayoría de las licencias de código abierto, la concesión de permisos está supeditada al cumplimiento de unas <span class="license-conditions"><span class="license-marker">ⓘ</span></span> <b>condiciones</b>.
appendix_legend_limitations_html: |-
  La mayoría de las licencias de código abierto también tienen <span class="license-limitations"><span class="license-marker">✕</span></span> <b>limitaciones</b> que normalmente excluyen la garantía y la responsabilidad, y a veces excluyen expresamente las patentes o las marcas de la concesión de la licencia.

