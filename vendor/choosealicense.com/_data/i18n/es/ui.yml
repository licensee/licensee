# Nota para los gestores de paquetes. %id% (identificador SPDX en <code>),
# %languages% (enlaces de lenguajes) y %clauses% se rellenan y no se traducen;
# solo se traduce la prosa que los rodea.
sidebar_pkg_html: |-
  Añade %id%%clauses% a la descripción del paquete de tu proyecto, si procede (por ejemplo, %languages%). Así la licencia se mostrará en los directorios de paquetes.
sidebar_pkg_only_html: " (o %id% para no permitir versiones futuras)"
sidebar_pkg_ofl_html: " (o %id% si se especifica un Nombre de Fuente Reservado después de la declaración de copyright)"
sidebar_gplcc_html: |-
  Si quieres que tu proyecto adopte la cláusula de subsanación de la GPL-3.0, añade el <a href="https://github.com/gplcc/gplcc/blob/master/Project/COMMITMENT">texto</a> del <a href="https://gplcc.github.io/gplcc/">GPL Cooperation Commitment</a> a un archivo llamado <code>COMMITMENT</code> en el mismo directorio que tu archivo de licencia %id%.

