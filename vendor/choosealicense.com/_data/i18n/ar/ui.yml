# --- الصفحة الرئيسية ----------------------------------------------------------
home_intro: |-
  يحمي الترخيص مفتوح المصدر المساهمين والمستخدمين. ولن تقترب الشركات والمطوّرون المتمرّسون من مشروع يفتقر إلى هذه الحماية.
home_situations_question: "أيٌّ مما يلي يصف وضعك على أفضل وجه؟"
home_community_title: "أحتاج إلى العمل ضمن مجتمع."
home_community_content: |-
  استخدم [الترخيص الذي يفضّله المجتمع](community/) الذي تساهم فيه أو تعتمد عليه. سيندمج مشروعك معه تمامًا.

  إذا كانت لديك تبعية بلا ترخيص، فاطلب من القائمين عليها [إضافة ترخيص](no-permission/#for-users).
home_permissive_title: "أريده بسيطًا ومتساهلًا."
home_permissive_content: |-
  [ترخيص MIT](licenses/mit/) قصير ومباشر. يتيح للناس فعل أي شيء تقريبًا بمشروعك، مثل إنشاء نسخ مغلقة المصدر وتوزيعها.
home_copyleft_title: "يهمّني مشاركة التحسينات."
home_copyleft_content: |-
  يتيح [GNU GPLv3](licenses/gpl-3.0/) أيضًا للناس فعل أي شيء تقريبًا بمشروعك، *باستثناء* توزيع نسخ مغلقة المصدر.
home_more_question: "ماذا لو لم يناسبني أيٌّ من هذه الخيارات؟"
home_nonsoftware_title: "مشروعي ليس برمجيات."
home_nonsoftware_content: |-
  [توجد تراخيص لذلك](non-software/).
home_morechoices_title: "أريد المزيد من الخيارات."
home_morechoices_content: |-
  [تتوفر تراخيص أخرى](licenses/).
home_nolicense_title: "لا أريد اختيار ترخيص."
home_nolicense_content: |-
  [إليك ما يحدث إن لم تفعل](no-permission/).

# --- صفحة التراخيص (/licenses/) ----------------------------------------------
licenses_intro_html: |-
  تمنح التراخيص مفتوحة المصدر أي شخص الإذن باستخدام البرمجيات المرخّصة وتعديلها ومشاركتها لأي غرض، رهنًا بشروط تحفظ مصدر البرمجيات وانفتاحها. التراخيص التالية مرتّبة بحسب عدد الشروط، من الأكثر (GNU AGPLv3) إلى اللاشرط (Unlicense). لاحظ أن التراخيص الشائعة المعروضة في <a href="/">الصفحة الرئيسية</a> (GNU GPLv3 وMIT) تقع ضمن هذا الطيف.
licenses_appendix_note_html: |-
  إذا كنت تبحث عن جدول مرجعي بكل ترخيص على choosealicense.com، فراجع <a href="/appendix">الملحق</a>.
licenses_outro_html: |-
  تمثّل التراخيص أعلاه الطيف الكامل للتراخيص مفتوحة المصدر، من الأشد حمايةً إلى غير المشروطة. ومن المفترض أن يناسب أحدها معظم المشاريع الجديدة مفتوحة المصدر. وتوجد تراخيص أخرى كثيرة مفتوحة المصدر، بما في ذلك إصدارات أقدم وبدائل قريبة من بعض ما سبق. راجع المصادر المدرجة في <a href="/about/">صفحة «حول»</a> إن أردت قراءة المزيد.

  إذا كنت تعرف بالفعل ما تفعله ولديك ترخيص تفضّل استخدامه، فهذا رائع! لسنا هنا لتغيير رأيك. لكن إذا حيّرك العدد الكبير من الخيارات، فربما يمكننا مساعدتك.

# --- الملحق (/appendix/) -----------------------------------------------------
appendix_intro: |-
  للرجوع إليه، إليك جدولًا بكل ترخيص موصوف في [مستودع choosealicense.com](https://github.com/github/choosealicense.com).

  إذا كنت هنا لاختيار ترخيص، **[فابدأ من الصفحة الرئيسية](/)** لمعاينة بضعة تراخيص تناسب معظم الحالات.
appendix_col_license: "الترخيص"
appendix_legend_heading: "مفتاح الرموز"
appendix_legend_permissions_html: |-
  تمنح التراخيص مفتوحة المصدر للعموم <span class="license-permissions"><span class="license-marker">✓</span></span> <b>أذونات</b> للقيام بأمور مع الأعمال المرخّصة قد تمنعها لولا ذلك قوانين حقوق النشر أو غيرها من قوانين «الملكية الفكرية».
appendix_legend_conditions_html: |-
  يخضع منح الأذونات في معظم التراخيص مفتوحة المصدر للالتزام بـ<span class="license-conditions"><span class="license-marker">ⓘ</span></span> <b>شروط</b>.
appendix_legend_limitations_html: |-
  كما تحمل معظم التراخيص مفتوحة المصدر <span class="license-limitations"><span class="license-marker">✕</span></span> <b>قيودًا</b> تُخلي عادةً المسؤولية وتُسقط الضمان، وتستثني أحيانًا براءات الاختراع أو العلامات التجارية صراحةً من منح الترخيص.

