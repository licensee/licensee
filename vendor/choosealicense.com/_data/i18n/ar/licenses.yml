  note: |-
    توصي مؤسسة البرمجيات الحرة بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى أعلى كل ملف. ويمكن العثور على هذا الإشعار في نهاية الترخيص.

mit:
  nickname: "MIT"
  description: |-
    ترخيص متساهل قصير وبسيط بشروط لا تتطلّب سوى الحفاظ على إشعارات حقوق النشر والترخيص. ويمكن توزيع الأعمال المرخّصة وتعديلاتها والأعمال الأكبر بشروط مختلفة ودون شيفرة مصدرية.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف. استبدل [year] بالسنة الحالية و[fullname] باسم (أو أسماء) أصحاب حقوق النشر.

mpl-2.0:
  description: |-
    تتوقّف أذونات ترخيص الحقوق المتروكة الضعيف هذا على إتاحة الشيفرة المصدرية للملفات المرخّصة وتعديلات تلك الملفات بالترخيص نفسه (أو، في حالات معيّنة، أحد تراخيص GNU). ويجب الحفاظ على إشعارات حقوق النشر والترخيص. ويمنح المساهمون صراحةً حقوق براءات اختراع. ومع ذلك، يمكن توزيع عمل أكبر يستخدم العمل المرخّص بشروط مختلفة ودون شيفرة مصدرية للملفات المضافة في العمل الأكبر.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.
  note: |-
    توصي مؤسسة Mozilla بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى أعلى كل ملف. ويمكن العثور على هذا الإشعار في نهاية الترخيص (Exhibit A).

unlicense:
  description: |-
    ترخيص بلا أي شروط على الإطلاق، يُهدي الأعمال إلى الملك العام. ويمكن توزيع الأعمال غير المرخّصة وتعديلاتها والأعمال الأكبر بشروط مختلفة ودون شيفرة مصدرية.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً UNLICENSE أو UNLICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص إخلاء مسؤولية الترخيص إلى الملف.
