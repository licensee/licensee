# الملخصات العربية للتراخيص (قيمة غير قانونية). المفتاح = معرّف SPDX بحروف صغيرة.
# تُترجَم الحقول الوصفية فقط؛ وأي حقل غائب يرجع إلى المقدّمة الإنجليزية لملف
# _licenses/<id>.txt، والنص القانوني للترخيص لا يُترجَم أبدًا.

agpl-3.0:
  description: |-
    تتوقّف أذونات هذا الترخيص — وهو أقوى تراخيص الحقوق المتروكة — على إتاحة الشيفرة المصدرية الكاملة للأعمال المرخّصة وتعديلاتها، بما في ذلك الأعمال الأكبر التي تستخدم عملًا مرخّصًا، بالترخيص نفسه. ويجب الحفاظ على إشعارات حقوق النشر والترخيص. ويمنح المساهمون صراحةً حقوق براءات اختراع. وعندما تُستخدم نسخة معدّلة لتقديم خدمة عبر شبكة، يجب إتاحة الشيفرة المصدرية الكاملة لتلك النسخة المعدّلة.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.
  note: |-
    توصي مؤسسة البرمجيات الحرة بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى أعلى كل ملف. ويمكن العثور على هذا الإشعار في نهاية الترخيص.

apache-2.0:
  description: |-
    ترخيص متساهل تتطلّب شروطه الرئيسية الحفاظ على إشعارات حقوق النشر والترخيص. ويمنح المساهمون صراحةً حقوق براءات اختراع. ويمكن توزيع الأعمال المرخّصة وتعديلاتها والأعمال الأكبر بشروط مختلفة ودون شيفرة مصدرية.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.
  note: |-
    <a href="https://apache.org/foundation/license-faq.html#Apply-My-Software">توصي</a> مؤسسة برمجيات Apache بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى ترويسة كل ملف مصدري. ويمكنك العثور على هذا الإشعار في الملحق في آخر نص الترخيص تمامًا.

bsd-2-clause:
  description: |-
    ترخيص متساهل يأتي في صورتين، <a href="/licenses/bsd-2-clause/">BSD 2-Clause</a> و<a href="/licenses/bsd-3-clause/">BSD 3-Clause</a>. وكلاهما يختلف اختلافًا طفيفًا جدًا عن ترخيص MIT.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف. استبدل [year] بالسنة الحالية و[fullname] باسم (أو أسماء) أصحاب حقوق النشر.

bsd-3-clause:
  nickname: |-
    ترخيص BSD المعدّل
  description: |-
    ترخيص متساهل يشبه <a href="/licenses/bsd-2-clause/">ترخيص BSD 2-Clause</a>، لكن مع بند ثالث يمنع الآخرين من استخدام اسم صاحب حقوق النشر أو مساهميه للترويج للمنتجات المشتقّة دون موافقة كتابية.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف. استبدل [year] بالسنة الحالية و[fullname] باسم (أو أسماء) أصحاب حقوق النشر.

bsl-1.0:
  description: |-
    ترخيص متساهل بسيط لا يتطلّب سوى الحفاظ على إشعارات حقوق النشر والترخيص عند التوزيع في صورة مصدرية (لا ثنائية). ويمكن توزيع الأعمال المرخّصة وتعديلاتها والأعمال الأكبر بشروط مختلفة ودون شيفرة مصدرية.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.
  note: |-
    توصي Boost بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى أعلى كل ملف. ويمكن العثور على هذا الإشعار في <a href="https://www.boost.org/users/license.html#FAQ">الأسئلة الشائعة لترخيص Boost Software License</a>.

cc0-1.0:
  description: |-
    يتنازل <a href="https://creativecommons.org/publicdomain/zero/1.0/">إهداء المشاع الإبداعي CC0 إلى الملك العام</a> عن المصلحة في حقوق النشر في عمل أنشأته ويُهديه إلى الملك العام عالميًا. استخدم CC0 للتخلّي عن حقوق النشر كليًا وضمان أوسع انتشار لعملك. وكما هو الحال مع Unlicense وتراخيص البرمجيات المعتادة، يُسقط CC0 الضمانات. وCC0 يشبه إلى حدٍّ بعيد Unlicense.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.
  note: |-
    يوصي المشاع الإبداعي بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى أعلى كل ملف. ويمكن <a href="https://wiki.creativecommons.org/wiki/CC0_FAQ#May_I_apply_CC0_to_computer_software.3F_If_so.2C_is_there_a_recommended_implementation.3F">العثور على هذا الإشعار في موقعهم</a>.

epl-2.0:
  description: |-
    يوفّر ترخيص الحقوق المتروكة هذا، المؤاتي للأعمال التجارية، القدرة على ترخيص النسخ الثنائية تجاريًا؛ ومنح براءة اختراع حديثًا ومعفى من الإتاوات؛ وإمكانية أن تستخدم الأعمال المرتبطة تراخيص أخرى، بما فيها التجارية.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.

gpl-2.0:
  nickname: |-
    GNU GPLv2
  description: |-
    GNU GPL هو أوسع تراخيص البرمجيات الحرة استخدامًا، وله متطلّب حقوق متروكة قوي. وعند توزيع الأعمال المشتقّة، يجب إتاحة الشيفرة المصدرية للعمل بالترخيص نفسه. وتوجد عدة صور من GNU GPL، لكلٍّ منها متطلّبات مختلفة.
  how: |-
    أنشئ ملفًا نصيًا (يُسمّى عادةً LICENSE أو LICENSE.txt) في جذر شيفرتك المصدرية وانسخ نص الترخيص إلى الملف.
  note: |-
    توصي مؤسسة البرمجيات الحرة بخطوة إضافية تتمثّل في إضافة إشعار نموذجي إلى أعلى كل ملف. ويمكن العثور على هذا الإشعار في نهاية الترخيص.

