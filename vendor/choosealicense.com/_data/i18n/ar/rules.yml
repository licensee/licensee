# التسميات والأوصاف العربية للقواعد (الأذونات / الشروط / القيود).
# مصدر الحقيقة يبقى _data/rules.yml (بالإنجليزية): منه يأتي الترتيب والمعرّفات،
# وأي مدخل غائب هنا يرجع إلى الإنجليزية.
# البنية: <المجموعة> ← <tag> ← { label, description }.

permissions:
  commercial-use:
    label: "استخدام تجاري"
    description: "يمكن استخدام المادة المرخّصة ومشتقّاتها لأغراض تجارية."
  modifications:
    label: "التعديل"
    description: "يمكن تعديل المادة المرخّصة."
  distribution:
    label: "التوزيع"
    description: "يمكن توزيع المادة المرخّصة."
  private-use:
    label: "استخدام خاص"
    description: "يمكن استخدام المادة المرخّصة وتعديلها على نحو خاص."
  patent-use:
    label: "استخدام البراءات"
    description: "يمنح هذا الترخيص صراحةً حقوق براءات اختراع من المساهمين."

conditions:
  include-copyright:
    label: "إشعار الترخيص وحقوق النشر"
    description: "يجب تضمين نسخة من الترخيص وإشعار حقوق النشر مع المادة المرخّصة."
  include-copyright--source:
    label: "إشعار الترخيص (للمصدر)"
    description: "يجب تضمين نسخة من الترخيص وإشعار حقوق النشر مع المادة المرخّصة في صورة مصدرية، لكنها ليست مطلوبة للنسخ الثنائية."
  document-changes:
    label: "توثيق التغييرات"
    description: "يجب توثيق التغييرات التي أُجريت على المادة المرخّصة."
  disclose-source:
    label: "الكشف عن المصدر"
    description: "يجب إتاحة الشيفرة المصدرية عند توزيع المادة المرخّصة."
  network-use-disclose:
    label: "الاستخدام الشبكي توزيع"
    description: "يُمنح المستخدمون الذين يتفاعلون مع المادة المرخّصة عبر شبكة الحق في الحصول على نسخة من الشيفرة المصدرية."
  same-license:
    label: "الترخيص نفسه"
    description: "يجب إصدار التعديلات بالترخيص نفسه عند توزيع المادة المرخّصة. وفي بعض الحالات يمكن استخدام ترخيص مماثل أو ذي صلة."
  same-license--file:
    label: "الترخيص نفسه (ملف)"
    description: "يجب إصدار تعديلات الملفات القائمة بالترخيص نفسه عند توزيع المادة المرخّصة. وفي بعض الحالات يمكن استخدام ترخيص مماثل أو ذي صلة."
  same-license--library:
    label: "الترخيص نفسه (مكتبة)"
    description: "يجب إصدار التعديلات بالترخيص نفسه عند توزيع المادة المرخّصة. وفي بعض الحالات يمكن استخدام ترخيص مماثل أو ذي صلة، أو قد لا ينطبق هذا الشرط على الأعمال التي تستخدم المادة المرخّصة كمكتبة."

limitations:
  trademark-use:
    label: "استخدام العلامات التجارية"
    description: "ينصّ هذا الترخيص صراحةً على أنه لا يمنح حقوق علامات تجارية، مع أن التراخيص التي تخلو من مثل هذا النص على الأرجح لا تمنح أي حقوق علامات تجارية ضمنية."
  liability:
    label: "المسؤولية"
    description: "يتضمّن هذا الترخيص تحديدًا للمسؤولية."
  patent-use:
    label: "استخدام البراءات"
    description: "ينصّ هذا الترخيص صراحةً على أنه لا يمنح أي حقوق في براءات اختراع المساهمين."
  warranty:
    label: "الضمان"
    description: "ينصّ هذا الترخيص صراحةً على أنه لا يقدّم أي ضمان."
