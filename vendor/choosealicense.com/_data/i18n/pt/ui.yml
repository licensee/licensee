sidebar_pkg_ofl_html: " (ou %id% se um Nome de Fonte Reservado for especificado após a declaração de direitos autorais)"
sidebar_gplcc_html: |-
  Se você quiser que seu projeto adote a cláusula de regularização da GPL-3.0, adicione o <a href="https://github.com/gplcc/gplcc/blob/master/Project/COMMITMENT">texto</a> do <a href="https://gplcc.github.io/gplcc/">GPL Cooperation Commitment</a> em um arquivo chamado <code>COMMITMENT</code>, no mesmo diretório do seu arquivo de licença %id%.

