# Nota para gerenciadores de pacotes. %id% (identificador SPDX em <code>),
# %languages% (links dos idiomas) e %clauses% permanecem sem tradução; apenas o
# texto ao redor abaixo é traduzido.
sidebar_pkg_html: |-
  Adicione %id%%clauses% à descrição do pacote do seu projeto, se aplicável (por ex., %languages%). Isso garantirá que a licença seja exibida nos diretórios de pacotes.
