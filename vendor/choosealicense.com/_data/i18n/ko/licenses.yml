# 라이선스 요약의 한국어 번역(법적 효력 없음). 키 = 소문자 SPDX 식별자.
# 설명 관련 필드만 번역하며, 없는 필드는 _licenses/<id>.txt의 영어 프런트매터로
# 대체됩니다. 라이선스의 법률 원문은 절대 번역하지 않습니다.

agpl-3.0:
  description: |-
    가장 강력한 이 카피레프트 라이선스의 허용은, 라이선스가 부여된 저작물과 그 수정본(라이선스 저작물을 사용하는 더 큰 저작물 포함)의 완전한 소스 코드를 동일한 라이선스로 제공하는 것을 전제로 합니다. 저작권 및 라이선스 표시는 보존되어야 합니다. 기여자는 명시적인 특허권을 부여합니다. 수정된 버전이 네트워크를 통해 서비스를 제공하는 데 사용될 경우, 그 수정 버전의 완전한 소스 코드를 제공해야 합니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Free Software Foundation은 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 라이선스 끝부분에서 찾을 수 있습니다.

apache-2.0:
  description: |-
    저작권 및 라이선스 표시의 보존을 주요 조건으로 하는 관대형 라이선스입니다. 기여자는 명시적인 특허권을 부여합니다. 라이선스가 부여된 저작물, 수정본, 더 큰 저작물은 다른 조건으로, 소스 코드 없이 배포할 수 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Apache Software Foundation은 각 소스 파일의 헤더에 상용구 표기를 추가하는 단계를 더할 것을 <a href="https://apache.org/foundation/license-faq.html#Apply-My-Software">권장합니다</a>. 이 표기는 라이선스 텍스트의 맨 끝 부록에서 찾을 수 있습니다.

bsd-2-clause:
  description: |-
    <a href="/licenses/bsd-2-clause/">BSD 2-Clause</a>와 <a href="/licenses/bsd-3-clause/">BSD 3-Clause</a> 두 가지 변형으로 존재하는 관대형 라이선스입니다. 둘 다 MIT 라이선스와는 아주 미세한 차이만 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요. [year]를 현재 연도로, [fullname]을 저작권자의 이름(또는 이름들)으로 바꾸세요.

bsd-3-clause:
  description: |-
    <a href="/licenses/bsd-2-clause/">BSD 2-Clause License</a>와 유사한 관대형 라이선스이지만, 서면 동의 없이 저작권자 또는 그 기여자의 이름을 파생 제품 홍보에 사용하는 것을 금지하는 세 번째 조항이 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요. [year]를 현재 연도로, [fullname]을 저작권자의 이름(또는 이름들)으로 바꾸세요.

bsl-1.0:
  description: |-
    소스(바이너리가 아닌) 형태로 배포할 때만 저작권 및 라이선스 표시의 보존을 요구하는 단순한 관대형 라이선스입니다. 라이선스가 부여된 저작물, 수정본, 더 큰 저작물은 다른 조건으로, 소스 코드 없이 배포할 수 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Boost는 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 <a href="https://www.boost.org/users/license.html#FAQ">Boost Software License FAQ</a>에서 찾을 수 있습니다.

cc0-1.0:
  description: |-
    <a href="https://creativecommons.org/publicdomain/zero/1.0/">크리에이티브 커먼즈 CC0 퍼블릭 도메인 헌정</a>은 당신이 창작한 저작물에 대한 저작권상의 이익을 포기하고 이를 전 세계 퍼블릭 도메인에 헌정합니다. 저작권을 완전히 포기하고 저작물이 가장 널리 도달하도록 하려면 CC0을 사용하세요. Unlicense나 일반적인 소프트웨어 라이선스와 마찬가지로, CC0은 보증을 부인합니다. CC0은 Unlicense와 매우 유사합니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    크리에이티브 커먼즈는 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 <a href="https://wiki.creativecommons.org/wiki/CC0_FAQ#May_I_apply_CC0_to_computer_software.3F_If_so.2C_is_there_a_recommended_implementation.3F">그들의 웹사이트에서 찾을 수 있습니다</a>.

epl-2.0:
  description: |-
    상업적으로 친화적인 이 카피레프트 라이선스는 바이너리를 상업적으로 라이선스할 수 있는 기능, 현대적인 무로열티 특허 라이선스 부여, 그리고 링크된 저작물이 상업적 라이선스를 포함한 다른 라이선스를 사용할 수 있는 기능을 제공합니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.

gpl-2.0:
  description: |-
    GNU GPL은 가장 널리 사용되는 자유 소프트웨어 라이선스이며 강력한 카피레프트 요건을 갖습니다. 파생 저작물을 배포할 때, 해당 저작물의 소스 코드를 동일한 라이선스로 제공해야 합니다. GNU GPL에는 여러 변형이 있으며, 각각 요건이 다릅니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Free Software Foundation은 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 라이선스 끝부분에서 찾을 수 있습니다.

gpl-3.0:
  description: |-
    강력한 이 카피레프트 라이선스의 허용은, 라이선스가 부여된 저작물과 그 수정본(라이선스 저작물을 사용하는 더 큰 저작물 포함)의 완전한 소스 코드를 동일한 라이선스로 제공하는 것을 전제로 합니다. 저작권 및 라이선스 표시는 보존되어야 합니다. 기여자는 명시적인 특허권을 부여합니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(GNU 관례에 따라 보통 COPYING)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Free Software Foundation은 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 라이선스 끝부분에서 찾을 수 있습니다.

lgpl-2.1:
  description: |-
    주로 소프트웨어 라이브러리에 사용되는 GNU LGPL은 파생 저작물을 동일한 라이선스로 배포하도록 요구하지만, 단지 링크만 하는 저작물은 이 제한을 받지 않습니다. 흔히 사용되는 GNU LGPL에는 두 가지 버전이 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Free Software Foundation은 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 라이선스 끝부분에서 찾을 수 있습니다.

mit:
  description: |-
    저작권 및 라이선스 표시의 보존만을 조건으로 하는 짧고 단순한 관대형 라이선스입니다. 라이선스가 부여된 저작물, 수정본, 더 큰 저작물은 다른 조건으로, 소스 코드 없이 배포할 수 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요. [year]를 현재 연도로, [fullname]을 저작권자의 이름(또는 이름들)으로 바꾸세요.

mpl-2.0:
  description: |-
    약한 이 카피레프트 라이선스의 허용은, 라이선스가 부여된 파일과 그 파일의 수정본의 소스 코드를 동일한 라이선스(또는 특정 경우 GNU 라이선스 중 하나)로 제공하는 것을 전제로 합니다. 저작권 및 라이선스 표시는 보존되어야 합니다. 기여자는 명시적인 특허권을 부여합니다. 다만 라이선스 저작물을 사용하는 더 큰 저작물은 다른 조건으로, 더 큰 저작물에 추가된 파일의 소스 코드 없이 배포할 수 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 LICENSE 또는 LICENSE.txt)을 만들고 라이선스 텍스트를 그 파일에 복사하세요.
  note: |-
    Mozilla Foundation은 각 파일 상단에 상용구 표기를 추가하는 단계를 더할 것을 권장합니다. 상용구는 라이선스 끝부분(Exhibit A)에서 찾을 수 있습니다.

unlicense:
  description: |-
    어떠한 조건도 없이 저작물을 퍼블릭 도메인에 헌정하는 라이선스입니다. 이렇게 헌정된 저작물, 수정본, 더 큰 저작물은 다른 조건으로, 소스 코드 없이 배포할 수 있습니다.
  how: |-
    소스 코드의 루트에 텍스트 파일(보통 UNLICENSE 또는 UNLICENSE.txt)을 만들고 라이선스 권리포기 텍스트를 그 파일에 복사하세요.
