# 패키지 관리자 안내. %id%(SPDX 식별자, <code>), %languages%(언어 링크),
# %clauses%(선택적 괄호 문구)는 번역하지 않고 그대로 채워집니다.
# 아래의 주변 문장만 번역합니다.
sidebar_pkg_html: |-
  해당되는 경우 프로젝트의 패키지 설명에 %id%%clauses%을(를) 추가하세요(예: %languages%). 이렇게 하면 패키지 디렉터리에 라이선스가 표시됩니다.
sidebar_pkg_only_html: " (또는 향후 버전을 허용하지 않으려면 %id%)"
sidebar_pkg_ofl_html: " (또는 저작권 표시 뒤에 예약 글꼴 이름이 지정된 경우 %id%)"
sidebar_gplcc_html: |-
  프로젝트에 GPL-3.0의 치유 조항을 채택하려면 <a href="https://gplcc.github.io/gplcc/">GPL Cooperation Commitment</a>의 <a href="https://github.com/gplcc/gplcc/blob/master/Project/COMMITMENT">텍스트</a>를 %id% 라이선스 파일과 같은 디렉터리에 있는 <code>COMMITMENT</code>라는 이름의 파일에 추가하세요.

