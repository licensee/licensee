# --- 홈페이지 ----------------------------------------------------------------
home_intro: |-
  오픈 소스 라이선스는 기여자와 사용자를 보호합니다. 기업과 노련한 개발자는 이러한 보호가 없는 프로젝트에는 손대지 않습니다.
home_situations_question: "다음 중 당신의 상황을 가장 잘 설명하는 것은 무엇인가요?"
home_community_title: "저는 커뮤니티 안에서 작업해야 합니다."
home_community_content: |-
  당신이 기여하거나 의존하는 [커뮤니티가 선호하는 라이선스](community/)를 사용하세요. 당신의 프로젝트가 자연스럽게 어울릴 것입니다.

  라이선스가 없는 의존성이 있다면, 그 메인테이너에게 [라이선스를 추가](no-permission/#for-users)해 달라고 요청하세요.
home_permissive_title: "간단하고 관대한 라이선스를 원합니다."
home_permissive_content: |-
  [MIT 라이선스](licenses/mit/)는 짧고 명료합니다. 비공개 소스 버전을 만들고 배포하는 것을 포함해, 사람들이 당신의 프로젝트로 거의 무엇이든 할 수 있게 해 줍니다.
home_copyleft_title: "개선 사항을 공유하는 것이 중요합니다."
home_copyleft_content: |-
  [GNU GPLv3](licenses/gpl-3.0/) 역시 사람들이 당신의 프로젝트로 거의 무엇이든 할 수 있게 해 주지만, 비공개 소스 버전을 배포하는 것은 *예외*입니다.
home_more_question: "이 중 어느 것도 제게 맞지 않으면 어떻게 하나요?"
home_nonsoftware_title: "제 프로젝트는 소프트웨어가 아닙니다."
home_nonsoftware_content: |-
  [그런 경우를 위한 라이선스가 있습니다](non-software/).
home_morechoices_title: "더 많은 선택지를 원합니다."
home_morechoices_content: |-
  [더 많은 라이선스가 있습니다](licenses/).
home_nolicense_title: "라이선스를 선택하고 싶지 않습니다."
home_nolicense_content: |-
  [선택하지 않으면 어떻게 되는지 알려드립니다](no-permission/).

# --- 라이선스 페이지(/licenses/) ---------------------------------------------
licenses_intro_html: |-
  오픈 소스 라이선스는 소프트웨어의 출처와 개방성을 보존하는 조건을 전제로, 누구나 라이선스가 부여된 소프트웨어를 어떤 목적으로든 사용, 수정, 공유할 수 있도록 허용합니다. 아래 라이선스는 조건의 수에 따라 가장 많은 것(GNU AGPLv3)부터 전혀 없는 것(Unlicense)까지 정렬되어 있습니다. <a href="/">홈페이지</a>에서 소개하는 인기 라이선스(GNU GPLv3와 MIT)도 이 범위 안에 들어 있다는 점에 유의하세요.
licenses_appendix_note_html: |-
  choosealicense.com의 모든 라이선스 참조 표를 찾고 있다면 <a href="/appendix">부록</a>을 참고하세요.
licenses_outro_html: |-
  위 라이선스들은 매우 보호적인 것부터 무조건적인 것까지 오픈 소스 라이선스의 전체 범위를 나타냅니다. 이 중 하나면 대부분의 새 오픈 소스 프로젝트에 적합할 것입니다. 위 라이선스의 이전 버전이나 가까운 대체 라이선스를 포함해, 다른 많은 오픈 소스 라이선스가 존재합니다. 더 자세히 알고 싶다면 <a href="/about/">소개 페이지</a>에 나열된 자료를 참고하세요.

  이미 잘 알고 있고 선호하는 라이선스가 있다면 더할 나위 없이 좋습니다! 우리는 당신의 생각을 바꾸려는 것이 아닙니다. 하지만 너무 많은 선택지에 어리둥절하다면, 우리가 도움이 될 수 있을지도 모릅니다.

# --- 부록(/appendix/) --------------------------------------------------------
appendix_intro: |-
  참고를 위해, [choosealicense.com 저장소](https://github.com/github/choosealicense.com)에 설명된 모든 라이선스의 표를 아래에 정리했습니다.

  라이선스를 선택하려고 오셨다면, **[홈페이지에서 시작하세요](/)**. 대부분의 경우에 적합한 몇 가지 라이선스를 볼 수 있습니다.
appendix_col_license: "라이선스"
appendix_legend_heading: "범례"
appendix_legend_permissions_html: |-
  오픈 소스 라이선스는, 저작권법이나 그 밖의 "지식 재산권" 법이 금지할 수도 있는 일을 라이선스가 부여된 저작물로 할 수 있도록 대중에게 <span class="license-permissions"><span class="license-marker">✓</span></span> <b>허용</b>을 부여합니다.
appendix_legend_conditions_html: |-
  대부분의 오픈 소스 라이선스가 부여하는 허용은 <span class="license-conditions"><span class="license-marker">ⓘ</span></span> <b>조건</b>의 준수를 전제로 합니다.
appendix_legend_limitations_html: |-
  대부분의 오픈 소스 라이선스에는 보통 보증과 책임을 부인하고, 때로는 라이선스의 부여 대상에서 특허나 상표를 명시적으로 제외하는 <span class="license-limitations"><span class="license-marker">✕</span></span> <b>제한</b>도 있습니다.

