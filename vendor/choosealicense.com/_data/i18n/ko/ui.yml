# 인터페이스 문자열과 페이지 본문의 한국어 번역.
# 여기에 없는 키는 자동으로 영어(_data/i18n/en/ui.yml)로 대체됩니다.
# _html로 끝나는 키는 원시 HTML을 담으며, 그 외 여러 줄 값은 Markdown입니다.
# 라이선스 요약은 licenses.yml에, 규칙 라벨은 rules.yml에 있습니다.
# 라이선스의 법률 원문은 절대 번역하지 않습니다.

